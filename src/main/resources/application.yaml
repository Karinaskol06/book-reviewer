spring:
  application:
    name: book-reviewer

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:bookreviewer}
    username: ${DB_USERNAME:bookreview_user}
    password: ${DB_PASSWORD:bookreview_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    show-sql: ${JPA_SHOW_SQL:false}
    open-in-view: false

  web:
    resources:
      static-locations: classpath:/static/,file:${app.upload.dir}/

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: true

# JWT Configuration
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000} # 24 hours in milliseconds
  refresh-token:
    expiration: ${JWT_REFRESH_EXPIRATION:604800000} # 7 days

# Server Configuration
server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: never
    include-exception: false

# Logging
logging:
  level:
    com.project.bookreviewer: ${LOG_LEVEL:INFO}
    org.springframework.security: INFO
    org.hibernate.SQL: ${JPA_SHOW_SQL:false}
    org.hibernate.type.descriptor.sql.BasicBinder: ${JPA_SHOW_SQL:false}

# Application Settings
application:
  security:
    bcrypt-strength: 12
  book:
    default-cover-url: "/images/book_placeholder.png"

app:
  upload:
    dir: ${UPLOAD_DIR:./uploads-book-reviewer}          # Base upload directory
    avatar:
      dir: ${AVATAR_DIR:avatars}           # Subdirectory for avatars
      max-size: 2MB
      allowed-types: image/jpeg,image/png,image/webp
  feed:
    backfill:
      days: 7      # backfill activities from last 7 days
      limit: 20

elasticsearch:
  host: localhost
  port: 9200