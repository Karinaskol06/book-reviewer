version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-bookreviewer}
      POSTGRES_USER: ${DB_USERNAME:-bookreview_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bookreview_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-bookreview_user} -d ${DB_NAME:-bookreviewer}"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: [ "CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q 'green\\|yellow'" ]
      interval: 10s
      timeout: 10s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-bookreviewer}
      DB_USERNAME: ${DB_USERNAME:-bookreview_user}
      DB_PASSWORD: ${DB_PASSWORD:-bookreview_password}
      JWT_SECRET: ${JWT_SECRET}
      ELASTICSEARCH_HOST: elasticsearch
      ELASTICSEARCH_PORT: 9200

  frontend:
    build: ./bookreviewer-frontend
    ports:
      - "80:80"
    depends_on:
      - app

volumes:
  postgres_data:
  es_data: