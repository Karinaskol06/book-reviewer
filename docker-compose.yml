version: '3.8'
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-bookreviewer}
      POSTGRES_USER: ${DB_USERNAME:-bookreview_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bookreview_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-bookreview_user} -d ${DB_NAME:-bookreviewer}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-bookreviewer}
      DB_USERNAME: ${DB_USERNAME:-bookreview_user}
      DB_PASSWORD: ${DB_PASSWORD:-bookreview_password}
      JWT_SECRET: 5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437

volumes:
  postgres_data: